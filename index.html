/* Convert to Set for fast lookup */
const UPSC_SET = new Set(
  UPSC_SHORTLIST_RAW.trim().split(/\s+/)
);

/* =====================================
   MAIN CHECK FUNCTION
   ===================================== */

function checkUPSC() {
  const roll = document.getElementById("upscRoll").value.trim();
  const mobile = document.getElementById("upscMobile").value.trim();

  if (!roll) {
    showUPSC("Please enter a valid Registration Number.", false);
    return;
  }

  if (!/^[6-9]\d{9}$/.test(mobile)) {
    showUPSC("Please enter a valid 10-digit mobile number.", false);
    return;
  }

  const found = UPSC_SET.has(roll);

  showUPSC(
    found
      ? `✔ ELIGIBLE: Registration Number ${roll} is shortlisted for the UPSC Civil Services Main stage. Please check the official notification for confirmation.`
      : `✖ NOT ELIGIBLE: Registration Number ${roll} is not found in the shortlisted list. Please verify with the official notification.`,
    found
  );

  sendToSheet(
    mobile,
    roll,
    found ? "Eligible" : "Not Eligible"
  );
}

/* =====================================
   UI MESSAGE HANDLER
   ===================================== */

function showUPSC(msg, success) {
  const box = document.getElementById("upscResult");
  box.style.background = success ? "#dcfce7" : "#fee2e2";
  box.style.color = success ? "#166534" : "#991b1b";
  box.innerText = msg;
}

/* =====================================
   GOOGLE SHEET INTEGRATION
   ===================================== */

function sendToSheet(mobile, roll, result) {
  const fd = new FormData();
  fd.append("mobile", mobile);
  fd.append("roll", roll);
  fd.append("result", result);
  fd.append("exam", "UPSC Civil Services");

  fetch(
    "https://script.google.com/macros/s/AKfycbz9I3BPW0xMYiWGD3RU_2Zf9wa05RGHoc_7cvjHMpc7Lv3sfYn6Pj-XCCI9y8o7A6xFcg/exec",
    {
      method: "POST",
      body: fd
    }
  ).catch(() => {});
}
</script>
